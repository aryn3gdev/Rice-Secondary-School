    <!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Rice Secondary - Apply</title>
  <style>
    form {
      max-width: 500px;
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, select, textarea {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      font-size: 18px;
      background-color: #222;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #444;
    }
  </style>
</head>
<body>

  <h1 class="apply">Apply today!</h1>

  <form id="applicationForm">
    <input type="text" name="fullName" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email or Phone Number" required>
    <input type="text" name="discordID" placeholder="Discord ID" required>
    <input type="text" name="robloxID" placeholder="Roblox ID" required>
    <input type="number" name="age" placeholder="Age" required>

    <!-- Extra fields can be added here -->
    <!-- <input type="text" name="extra1" placeholder="Extra Field"> -->

    <button type="submit">Submit Application</button>
  </form>

  <script>
    const form = document.getElementById('applicationForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // Prevent page refresh

      // Collect form data
      const formData = new FormData(form);
      const data = {};
      formData.forEach((value, key) => { data[key] = value });

      // Construct Discord message
      const content = `**New Application Received**\n` +
                      `Full Name: ${data.fullName}\n` +
                      `Email/Phone: ${data.email}\n` +
                      `Discord ID: ${data.discordID}\n` +
                      `Roblox ID: ${data.robloxID}\n` +
                      `Age: ${data.age}`;

      // Send to Discord webhook
try {
  const res = await fetch('/api/sendApplication', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ content })
  });

  if (!res.ok) throw new Error("Request failed");

  alert('Application sent successfully!');
  form.reset();
} catch (err) {
  alert('Error sending application. Please try again.');
  console.error(err);
}
  </script>
<h6>© Rice Secondary 2026. All rights reserved.</h6>

  </body>
